# /home/dlyerly/SecurityDrone/src/scripts/config/tello_ppo_cfg.yaml

seed: 42

# Agent Hyperparameters
agent:
  rollouts: 24
  learning_epochs: 10
  mini_batches: 4
  discount_factor: 0.99
  gae_lambda: 0.95
  learning_rate: 0.0003
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 0.5
  ratio_clip: 0.2
  value_clip: 0.2
  value_loss_scale: 0.5
  entropy_loss_scale: 0.01

# Trainer Engine Configuration
trainer:
  timesteps: 10000000
  close_environment_at_exit: true

# Rollout Memory Buffer Configuration
memory:
  memory_size: 24